server:
  replicaCount: 1
  config:
    logLevel: info
    numHistoryShards: 4
    persistence:
      defaultStore: default
      visibilityStore: visibility
      datastores:
        default:
          sql:
            createDatabase: false
            manageSchema: true
            pluginName: postgres12
            driverName: postgres12
            databaseName: temporal
            connectAddr: postgres-rw.temporal.svc.cluster.local:5432
            connectProtocol: tcp
            user: temporal
            existingSecret: temporal-db
            secretKey: password
            maxConns: 20
            maxIdleConns: 20
            maxConnLifetime: 1h
        visibility:
          sql:
            createDatabase: false
            manageSchema: true
            pluginName: postgres12
            driverName: postgres12
            databaseName: temporal_visibility
            connectAddr: postgres-rw.temporal.svc.cluster.local:5432
            connectProtocol: tcp
            user: temporal
            existingSecret: temporal-db
            secretKey: password
            maxConns: 20
            maxIdleConns: 20
            maxConnLifetime: 1h
web:
  enabled: true
