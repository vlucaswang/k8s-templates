apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: temporal-ui
  namespace: temporal
  labels:
    app.kubernetes.io/part-of: temporal-kind
spec:
  parentRefs:
    - name: temporal-local
      namespace: kgateway-system
      sectionName: temporal-ui
  hostnames:
    - temporal-ui.localhost
  rules:
    - backendRefs:
        - name: temporal-web
          port: 8080
