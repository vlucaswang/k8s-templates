apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: temporal-ui
  namespace: temporal
  labels:
    app.kubernetes.io/part-of: temporal-kind
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: temporal-local
      namespace: kgateway-system
      sectionName: temporal-ui
  hostnames:
    - temporal-ui.localhost
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: temporal-web
          port: 8080
          weight: 1
