apiVersion: v1
kind: Service
metadata:
  name: {{ include "redis.name" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "redis.selectorLabels" . | nindent 4 }}
  ports:
    - name: redis
      port: 6379
      targetPort: redis
    {{- if .Values.metrics.enabled }}
    - name: metrics
      port: 9121
      targetPort: metrics
    {{- end }}
