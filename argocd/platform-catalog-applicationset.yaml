apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: temporal-kind-platform-catalog
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - name: redis
            namespace: redis
            path: platform/charts/redis
            valuesFile: redis-local.yaml
  template:
    metadata:
      name: '{{ .name }}'
      labels:
        app.kubernetes.io/part-of: temporal-kind
        temporal.io/catalog-source: platform
    spec:
      project: temporal-kind
      sources:
        - repoURL: REPO_URL_PLACEHOLDER
          targetRevision: REPO_REVISION_PLACEHOLDER
          path: '{{ .path }}'
          helm:
            releaseName: '{{ .name }}'
            valueFiles:
              - $values/gitops/catalog-values/{{ .valuesFile }}
        - repoURL: REPO_URL_PLACEHOLDER
          targetRevision: REPO_REVISION_PLACEHOLDER
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
